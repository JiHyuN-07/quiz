  {s:"A", q:"What collision avoidance procedure is recommended when climbing or descending VFR on an airway?",

  {s:"A", q:"Eye movements during daytime collision avoidance scanning should",

  {s:"A", q:"Which technique should you use to scan for traffic to the right and left during straight-and-level flight?",

  {s:"A", q:"What is an effective way to scan for traffic in front of your airplane during climb?",
   c:["Perform 90 degree turns every 1–2 miles to check for traffic along your flight path.","Use your cockpit display of traffic information (CDTI) to avoid aircraft that cannot be seen in a nose-high attitude.","Lower the nose periodically and clear the area, and then transition to cruise climb when altitude permits."],

  {s:"A", q:"How can you determine if another aircraft is on a collision course with your aircraft?",

  {s:"A", q:"What is the appropriate way to use a cockpit display of traffic information (CDTI) to avoid a collision?",

   a:2, ex:"During takeoff and landing, and while enroute, each required flight crewmember shall keep the safety belt fastened. In addition, during takeoff and landing, each required flight crewmember shall keep the shoulder harness fastened."},
  {s:"A", q:"With certain exceptions, safety belts are required to be secured about passengers during",
   c:["taxi, takeoffs, and landings.","all flight conditions.","flight in turbulent air."],
   a:0, ex:"Passengers are only required to have safety belts (and shoulder harnesses, if installed) fastened during taxi, takeoff, and landing."},
  {s:"A", q:"Your instructor has demonstrated a maneuver and wants you to try it. What steps should you complete to assume control of the airplane?",
   c:["Tell the instructor that you are ready to try the maneuver and start performing the maneuver when the airplane is stabilized.","Start performing the maneuver after your instructor says, \"you have the flight controls,\" and let the instructor monitor your performance.","After your instructor says, \"you have the flight controls,\" say \"I have the flight controls,\" and watch for your instructor to confirm again, \"you have the flight controls.\""],
   a:2, ex:"To ensure that it is clear who has control of the airplane, the FAA recommends a three-step process when exchanging the flight controls: the pilot passing control says \"You have the flight controls\"; the pilot taking control says \"I have the flight controls\"; and the pilot passing control confirms \"You have the flight controls.\""},
  {s:"A", q:"Which incident requires an immediate notification to the nearest NTSB field office?",
   c:["A forced landing due to engine failure.","Landing gear damage, due to a hard landing.","Flight control system malfunction or failure."],
   a:2, ex:"The operator of an aircraft shall immediately notify the nearest NTSB field office when a flight control system malfunction or failure occurs."},
  {s:"A", q:"Which incident would require an immediate notification to the nearest NTSB field office?",
   c:["An in-flight generator or alternator failure.","An in-flight fire.","An in-flight loss of VOR receiver capability."],
   a:1, ex:"The operator of an aircraft shall immediately notify the nearest NTSB field office when a fire in flight occurs."},
  {s:"A", q:"Which incident requires an immediate notification be made to the nearest NTSB field office?",
   c:["An overdue aircraft that is believed to be involved in an accident.","Inadvertent door or window opening in-flight.","An in-flight generator or alternator failure."],
   a:0, ex:"The operator of an aircraft shall immediately notify the nearest NTSB field office when an overdue aircraft is believed to be involved in an accident."},
  {s:"A", q:"On a postflight inspection of your aircraft after an aborted takeoff due to an elevator malfunction, you find that the elevator control cable has broken. According to NTSB 830, you",
   c:["must immediately notify the nearest NTSB office.","should notify the NTSB within 10 days.","must file a NASA report immediately."],
   a:0, ex:"NTSB 830.5 states that you must immediately notify the NTSB if an aircraft accident or serious incident occurs. Serious incidents include flight control system malfunction or failure."},
  {s:"A", q:"The operator of an aircraft that has been involved in an incident is required to submit a report to the nearest field office of the NTSB",
   c:["within 7 days.","within 10 days.","when requested."],
   a:2, ex:"A report on an incident for which notification is required by 830.5(a) shall be filed only when requested by an authorized representative of the NTSB."},
  {s:"A", q:"The operator of an aircraft that has been involved in an accident is required to file an accident report within how many days?",
   c:["5.","7.","10."],
   a:2, ex:"The operator of an aircraft shall file a report within 10 days after an accident, or after 7 days if an overdue aircraft is still missing."},
  {s:"A", q:"If an aircraft is involved in an accident that results in substantial damage to the aircraft, the nearest NTSB field office should be notified",
   c:["immediately.","within 48 hours.","within 7 days."],
   a:0, ex:"The operator of an aircraft shall immediately, and by the most expeditious means available, notify the nearest NTSB field office when an aircraft accident occurs."},
  {s:"A", q:"May aircraft wreckage be moved prior to the time the NTSB takes custody?",
   c:["Yes, but only if moved by a federal, state, or local law enforcement officer.","Yes, but only to protect the wreckage from further damage.","No, it may not be moved under any circumstances."],
   a:1, ex:"Before the NTSB takes custody, aircraft wreckage may not be disturbed or moved except to the extent necessary to protect the wreckage from further damage."},
  {s:"A", q:"Which is an appropriate action to take to manage a cabin door opening after departure?",
   c:["Immediately attempt to close the door.","Perform a normal traffic pattern and landing and close the door on the ground.","Decrease the airspeed to just above a stall speed to make it easier to close the door."],
   a:1, ex:"Accidents have occurred because pilots stopped flying the airplane to close doors. Stay calm, maintain control, do not release your shoulder harness to reach the door, and close it safely on the ground after a normal traffic pattern and landing."},
  {s:"A", q:"Which is true regarding emergency equipment and survival gear?",
   c:["FAR 91.205 requires that a fire extinguisher, ELT, and a survival kit be on board the airplane.","Because items might vary depending on the airplane, you must be familiar with using the specific emergency equipment and survival equipment on board each airplane you fly.","You are required by FAR Part 91 to brief your passengers on the location and use of all emergency equipment and survival gear."],
   a:1, ex:"You should be familiar with the emergency equipment and survival gear in each airplane you fly, which can include a fire extinguisher, egress hammer, or parachute system. Although not required by regulation, you should pack appropriate gear and brief passengers."},
  {s:"A", q:"When packing a survival kit to have on board the airplane, you should include",
   c:["only the items required by regulation.","equipment/gear needed for the specific terrain and weather along your route.","no more than a few core items to limit the weight in the baggage area."],
   a:1, ex:"The only survival gear required by the FARs are flotation gear and a signaling device for over-water-for-hire operations. However, any complete survival kit should contain a basic core of supplies plus additional items appropriate to the terrain and weather you would encounter."},

  // ======= SECTION B – Airports =======
  {s:"B", q:"Which is the correct traffic pattern departure procedure to use at an uncontrolled airport?",
   c:["Depart in any direction consistent with safety, after crossing the airport boundary.","Make all turns to the left.","Comply with any FAA traffic pattern established for the airport."],
   a:2, ex:"Each person operating an aircraft departing an airport without an operating control tower shall comply with any traffic patterns established for that airport in Part 93."},
  {s:"B", q:"The numbers 9 and 27 on a runway indicate that the runway is oriented approximately",
   c:["009° and 027° true.","090° and 270° true.","090° and 270° magnetic."],
   a:2, ex:"Runway numbers correspond to the magnetic, not true, direction, and are rounded to the nearest 10°, with the last zero omitted."},
  {s:"B", q:"The numbers 8 and 26 on the approach ends of a runway indicate that the runway is orientated approximately",
   c:["008° and 026° true.","080° and 260° true.","080° and 260° magnetic."],
   a:2, ex:"Runway numbers indicate the magnetic direction of a runway to the nearest 10 degrees. Runway 8 would be approximately 080°, and 26 would be approximately 260° magnetic."},
  {s:"B", q:"The recommended entry position to an airport traffic pattern is",
   c:["45° to the base leg just below traffic pattern altitude.","45° at the midpoint of the downwind leg at traffic pattern altitude.","to cross directly over the airport at traffic pattern altitude, and then join the downwind leg."],
   a:1, ex:"Always descend to traffic pattern altitude and level off before entering the pattern. The recommended traffic pattern entry is 45° at the midpoint of the runway on the downwind leg."},
  {s:"B", q:"(Refer to Figure 49.) Select the proper traffic pattern and runway for landing.",
   c:["Left-hand traffic and Runway 18.","Right-hand traffic and Runway 18.","Left-hand traffic and Runway 22."],
   a:1, ex:"The wind tetrahedron indicates landing should be to the southwest, but Runway 22 is closed. Runway 18 is the next best choice, and the \"L\" mark at that end of the circle shows right-hand traffic for Runway 18."},
  {s:"B", q:"(Refer to Figure 49.) If the wind is as shown by the landing-direction indicator, the pilot should land on",
   c:["Runway 18 and expect a crosswind from the right.","Runway 22 directly into the wind.","Runway 36 and expect a crosswind from the right."],
   a:0, ex:"The wind tetrahedron indicates landing should be to the southwest, but Runway 22 is closed. Runway 18 is the next best choice, with a crosswind from the right."},
  {s:"B", q:"(Refer to Figure 50.) The segmented circle indicates that the airport traffic is",
   c:["left hand for Runway 18 and right hand for Runway 36.","right hand for Runway 9 and left hand for Runway 27.","left hand for Runway 36 and right hand for Runway 18."],
   a:2, ex:"The segmented circle indicates left-hand traffic for Runways 9 and 36, and right-hand traffic for Runways 18 and 27."},
  {s:"B", q:"(Refer to Figure 50.) The traffic patterns indicated in the segmented circle have been arranged to avoid flights over an area to the",
   c:["south of the airport.","north of the airport.","southeast of the airport."],
   a:2, ex:"Because the traffic pattern for the north-south runway is west of the field, and the pattern for the east-west runway is north of the field, no traffic patterns should be flown southeast of the airport."},
  {s:"B", q:"(Refer to Figure 50.) The segmented circle indicates that a landing on Runway 26 is with a",
   c:["right-quartering headwind.","left-quartering headwind.","right-quartering tailwind."],
   a:0, ex:"Because the wind cone shows wind from the northwest, a landing to the west experiences a right-quartering headwind."},
  {s:"B", q:"(Refer to Figure 50.) Which runway and traffic pattern should be used as indicated by the wind cone in the segmented circle?",
   c:["Right-hand traffic on Runway 18.","Left-hand traffic on Runway 36.","Right-hand traffic on Runway 9."],
   a:1, ex:"With wind from the northwest, Runway 36 (a left-hand traffic pattern) would encounter a left-quartering headwind. Runway 27 is not an available answer choice."},
  {s:"B", q:"You should state your position on the airport when calling the tower for takeoff, especially when",
   c:["visibility is less than 1 mile.","parallel runways are in use.","departing from a runway intersection."],
   a:2, ex:"The AIM specifically requests you to state your position when calling from a runway intersection, for example: \"Centennial Tower, Cessna 5238-Kilo, at Alpha 3.\""},
  {s:"B", q:"The \"yellow demarcation bar\" marking indicates",
   c:["a runway with a displaced threshold from a blast pad, stopway, or taxiway that precedes the runway.","a hold line from a taxiway to a runway.","the beginning of available runway for landing on the approach side."],
   a:0, ex:"This double bar delineates a runway with a displaced threshold from a blast pad, stopway, or taxiway that precedes the runway."},
  {s:"B", q:"(Refer to Figure 65, item E.) This sign is a visual clue that",
   c:["confirms the aircraft's location to be on taxiway \"B.\"","warns the pilot of approaching taxiway \"B.\"","indicates \"B\" holding area is ahead."],
   a:0, ex:"A location sign has a black background with a yellow border and yellow numbers or letters. A yellow letter designates a taxiway on which the aircraft is located."},
  {s:"B", q:"(Refer to Figure 65, item F.) This sign confirms your position on",
   c:["Runway 22.","routing to Runway 22.","Taxiway 22."],
   a:0, ex:"A location sign has a black background with a yellow border and yellow numbers. The yellow number designates a runway on which the aircraft is located."},
  {s:"B", q:"(Refer to Figure 48.) The portion of the runway identified by the letter A may be used for",
   c:["landing.","taxiing and takeoff.","taxiing and landing."],
   a:1, ex:"The area before a displaced threshold may be used for taxi and takeoff, and roll-out after landing in the opposite direction, but not for landing."},
  {s:"B", q:"(Refer to Figure 65, item G.) From the cockpit, this marking confirms the aircraft to be",
   c:["on a taxiway, about to enter runway zone.","on a runway, about to clear.","near an instrument approach clearance zone."],
   a:1, ex:"This is a runway boundary sign, which faces the runway and is visible to the pilot exiting the runway. It provides a visual cue you can use to decide when you are \"clear of the runway.\""},
  {s:"B", q:"(Refer to Figure 48.) According to the airport diagram, which statement is true?",
   c:["Takeoffs may be started at position D on Runway 30, but the landing portion of this runway begins at position E.","Takeoffs may be started at position A on Runway 12, and the landing portion of this runway begins at position B.","The takeoff and landing portion of Runway 12 begins at position B."],
   a:1, ex:"The area before a displaced threshold may be used for taxi and takeoff. Landings may be made after the displaced threshold at position \"B\" on Runway 12."},
  {s:"B", q:"(Refer to Figure 48.) What is the difference between area A and area E on the airport depicted?",
   c:["\"A\" may be used for taxi and takeoff; \"E\" may be used only as an overrun.","\"A\" may be used for all operations except heavy aircraft landings; \"E\" may be used only as an overrun.","\"A\" may be used only for taxiing; \"E\" may be used for all operations except landings."],
   a:0, ex:"Area \"A\" before a displaced threshold may be used for taxi and takeoff, and roll-out after landing. Area \"E\" is a blastpad/stopway not designed to support continuous operations, but it may be used as an overrun."},
  {s:"B", q:"(Refer to Figure 48.) Area C on the airport depicted is a",
   c:["stabilized area.","multiple heliport.","closed runway."],
   a:2, ex:"A closed runway is depicted by Xs."},
  {s:"B", q:"(Refer to Figure 64.) Which marking indicates a vehicle lane?",
   c:["A.","C.","E."],
   a:1, ex:"Lanes for ground vehicles look similar to a road painted on the airport surface."},
  {s:"B", q:"(Refer to Figure 49.) The arrows that appear on the ends of the north/south runway indicate that these areas",
   c:["may be used only for taxiing.","is usable for taxiing, takeoff, and landing.","cannot be used for landing, but may be used for taxiing and takeoff."],
   a:2, ex:"The area before a displaced threshold may be used for taxi and takeoff, and for roll-out after landing in the opposite direction, but not for landing."},
  {s:"B", q:"At a towered airport, when approaching taxiway holding lines from the side with the continuous lines, you",
   c:["may continue taxiing.","should not cross the lines without an ATC clearance.","should continue taxiing until all parts of the aircraft have crossed the lines."],
   a:1, ex:"When approaching a taxiway hold line from the side with the continuous (solid) line at a towered airport, you should not cross the hold line without ATC clearance."},
  {s:"B", q:"Which is true regarding runway incursions?",
   c:["To help prevent a runway incursion during periods of reduced visibility or at night use your exterior taxi/landing lights when practical.","A runway incursion is defined as any occurrence at an airport involving an aircraft, vehicle, person, or object on the ground that results in a collision.","Runway incursions are primarily caused by controller errors."],
   a:0, ex:"A runway incursion is any occurrence that creates a collision hazard or results in loss of separation with an aircraft taking off or landing. They are primarily caused by errors with clearances, communication, surface movement, and positional awareness. To help others see you, use exterior taxi/landing lights when practical."},
  {s:"B", q:"The runway status lights (RWSL) system is primarily used to",
   c:["provide weather updates to pilots.","signal distress in case of an emergency.","indicate runway occupancy and help pilots avoid potential runway incursions."],
   a:2, ex:"Runway status lights are an automated system embedded in pavement that signals pilots when it is unsafe to enter, cross, or begin takeoff, enhancing runway safety by indicating runway occupancy."},
  {s:"B", q:"What is the purpose of the runway/runway hold position sign?",
   c:["Denotes entrance to runway from a taxiway.","Denotes area protected for an aircraft approaching or departing a runway.","Denotes intersecting runways."],
   a:2, ex:"These signs are installed with pavement markings on runways used for LAHSO or taxiing operations. Like other holding position signs, they consist of white runway numbers on a red background and denote intersecting runways."},
  {s:"B", q:"What does the outbound destination sign identify?",
   c:["Identifies entrance to the runway from a taxiway.","Identifies direction to takeoff runways.","Identifies runway on which an aircraft is located."],
   a:1, ex:"An outbound destination sign displays black text on a yellow background with an arrow showing the direction of the taxiing route to that destination (such as takeoff runways)."},
  {s:"B", q:"How can you determine whether your destination airport uses land and hold short operations (LAHSO)?",
   c:["The notation \"L\" preceding the runway length on a VFR chart.","LAHSO information published in the Airport/Facility Directory listing in the Chart Supplement.","NOTAMs from Flight Service during your preflight weather briefing."],
   a:1, ex:"LAHSO information is published in the Chart Supplement's A/FD listing for that airport. An \"L\" preceding the runway length on a VFR chart indicates runway lighting, not LAHSO."},
  {s:"B", q:"Who has final authority to accept or decline any land and hold short (LAHSO) clearance?",
   c:["Pilot in command.","Air traffic controller.","Second in command."],
   a:0, ex:"As the pilot in command (PIC), you have the final authority to accept or decline any LAHSO clearance. Decline it if you determine that it compromises safety."},
  {s:"B", q:"When should you decline a land and hold short (LAHSO) clearance?",
   c:["When it compromises safety.","Only when the tower operator concurs.","Pilots may not decline a LAHSO clearance."],
   a:0, ex:"As the pilot in command (PIC), you have the final authority to accept or decline any LAHSO clearance. Decline it if you determine that it compromises safety."},
  {s:"B", q:"Where is the \"available landing distance\" (ALD) data published for an airport that utilizes land and hold short operations (LAHSO)?",
   c:["The special notices section of the Chart Supplement.","14 CFR Part 91, General Operating and Flight Rules.","Aeronautical Information Manual (AIM)."],
   a:0, ex:"ALD data is published in the listing for an airport that has LAHSO. Airport listings are in the A/FD (special notices) section of the Chart Supplement."},
  {s:"B", q:"What is the minimum visibility for a pilot to receive a land and hold short (LAHSO) clearance?",
   c:["3 nautical miles.","3 statute miles.","1 statute mile."],
   a:1, ex:"You should only receive a LAHSO clearance when there is a minimum ceiling of 1,000 feet and 3 statute miles visibility."},
  {s:"B", q:"An airport's rotating beacon operated during daylight hours indicates",
   c:["there are obstructions on the airport.","that weather at the airport located in Class D airspace is below basic VFR weather minimums.","the air traffic control tower is not in operation."],
   a:1, ex:"When the airport beacon is on during the daytime, it means the ceiling is less than 1,000 feet or the visibility is less than 3 miles, which is below basic VFR minimums."},
  {s:"B", q:"You can identify a military air station by a rotating beacon that emits",
   c:["white and green alternating flashes.","two quick white flashes between each green flash.","green, yellow, and white flashes."],
   a:1, ex:"A military airport beacon has two quick flashes of white light between each green flash."},
  {s:"B", q:"How can a military airport be identified at night?",
   c:["Alternate white and green light flashes.","Dual peaked (two quick) white flashes between each green flash.","White flashing lights with steady green at the same location."],
   a:1, ex:"A military airport beacon has two quick flashes of white light between each green flash."},
  {s:"B", q:"While operating in Class D airspace, each pilot of an aircraft approaching to land on a runway served by a visual approach slope indicator (VASI) shall",
   c:["maintain a 3° glide until approximately 1/2 mile to the runway before going below the VASI.","maintain an altitude at or above the glide slope until a lower altitude is necessary for a safe landing.","stay high until the runway can be reached in a power-off landing."],
   a:1, ex:"In Class D airspace approaching to land on a runway served by a VASI, FAR 91.129 requires you to maintain an altitude at or above the glide path until a lower altitude is necessary for a safe landing."},
  {s:"B", q:"When approaching to land on a runway served by a visual approach slope indicator (VASI), the pilot shall",
   c:["maintain an altitude that captures the glide slope at least 2 miles downwind from the runway threshold.","maintain an altitude at or above the glide slope.","remain on the glide slope and land between the two-light bar."],
   a:1, ex:"FAR 91.129 requires you to maintain an altitude at or above the glide path until a lower altitude is necessary for a safe landing."},
  {s:"B", q:"Which approach and landing objective is assured when the pilot remains on the proper glidepath of the VASI?",
   c:["Runway identification and course guidance.","Safe obstruction clearance in the approach area.","Lateral course guidance to the runway."],
   a:1, ex:"The VASI glide path provides safe obstruction clearance to the runway."},
  {s:"B", q:"A slightly high glide slope indication from a precision approach path indicator is",
   c:["four white lights.","three white lights and one red light.","two white lights and two red lights."],
   a:1, ex:"A slightly high indication on a precision approach path indicator (PAPI) is three white lights and one red light."},
  {s:"B", q:"A below glide slope indication from a pulsating visual approach slope indicator is a",
   c:["pulsating white light.","steady white light.","pulsating red light."],
   a:2, ex:"A pulsating approach slope indicator provides a pulsating red light when below glide slope."},
  {s:"B", q:"(Refer to Figure 47.) Illustration A indicates that the aircraft is",
   c:["above the glide slope.","on the glide slope.","below the glide slope."],
   a:1, ex:"A red over white indication is on glide slope."},
  {s:"B", q:"(Refer to Figure 47.) VASI lights as shown by illustration C indicate that the airplane is",
   c:["above the glide slope.","on the glide slope.","below the glide slope."],
   a:0, ex:"A white over white indication is above glide slope."},
  {s:"B", q:"(Refer to Figure 47.) While on final approach to a runway equipped with a standard two-bar VASI, the lights appear as shown by illustration D. This means that the aircraft is",
   c:["above the glide path.","below the glide path.","on the glide path."],
   a:1, ex:"A red over red indication is below the glide slope."},
  {s:"B", q:"To set the high intensity runway lights on medium intensity, the pilot should click the microphone seven times, then click it",
   c:["one time within four seconds.","three times within three seconds.","five times within five seconds."],
   a:2, ex:"At airports with a three-step pilot-controlled lighting system, five clicks turns the lights to medium intensity. For each adjustment, key the mic the required number of times within a period of five seconds."},
  {s:"B", q:"Airport taxiway edge lights are identified at night by",
   c:["white directional lights.","blue omnidirectional lights.","alternate red and green lights."],
   a:1, ex:"Taxiway edge lights are blue."},
  {s:"B", q:"You observe someone breaking into an airplane. What should you do?",
   c:["Call 1-866-GA-SECURE and then call 911.","Call 911 and then call 1-866-GA-SECURE.","Call 1-866-GA-SECURE and then try to detain the suspected criminal."],
   a:1, ex:"For criminal activity, such as someone breaking into an aircraft, do not confront the person — call 911 first, then 1-866-GA-SECURE (1-866-427-3287), and notify your airport, FBO, or flight school manager. Call only 1-866-GA-SECURE for suspicious, but not criminal, activity."},

  // ======= SECTION C – Aeronautical Charts =======
  {s:"C", q:"(Refer to Figure 20, area 3.) Determine the approximate latitude and longitude of Currituck County Airport.",
   c:["36°24'N – 76°01'W.","36°48'N – 76°01'W.","47°24'N – 75°58'W."],
   a:0, ex:"Counting tick marks (one minute each) down from the 36°30'N latitude line to the airport gives 36°24'N. At one tick mark west of the 76° longitude line, the longitude is 76°01'W."},
  {s:"C", q:"(Refer to Figure 21, area 3.) Which airport is located at approximately 47°21'30\"N latitude and 101°01'30\"W longitude?",
   c:["Poleschook.","Washburn.","Johnson."],
   a:1, ex:"Counting down 9-1/2 tick marks from 47°30'N gives 47°21'30\"N. Moving 1-1/2 tick marks left of the 101° line gives 101°01'30\"W. This intersection is at Washburn Airport (5C8)."},
  {s:"C", q:"(Refer to Figure 59, area 3.) Which airport is located at approximately 41°02'00\"N latitude and 83°59'00\"W longitude?",
   c:["Ruhes.","Putnam.","Bluffton."],
   a:1, ex:"The airport is two tick marks above the 41° latitude line. At 83°59'00\"W, it is one tick mark east of the 84° longitude line. This intersection is at Putnam Airport (OWX)."},
  {s:"C", q:"(Refer to Figure 21, area 2.) The CTAF/MULTICOM frequency for Garrison Airport is",
   c:["123.0 MHz.","122.8 MHz.","122.9 MHz."],
   a:2, ex:"The frequency next to the CTAF symbol (the letter \"C\" in a dark circle) is the multicom frequency of 122.9 MHz."},
  {s:"C", q:"(Refer to Figure 59, area 3.) The CTAF/MULTICOM frequency for Wyandot County Airport (56D) is",
   c:["123.0 MHz.","122.8 MHz.","122.9 MHz."],
   a:2, ex:"The frequency next to the CTAF symbol (the letter \"C\" in a dark circle) is the multicom frequency of 122.9 MHz."},
  {s:"C", q:"(Refer to Figure 22, area 2 and Figure 31.) At Coeur D'Alene, which frequency should be used as a Common Traffic Advisory Frequency (CTAF) to self-announce position and intentions?",
   c:["122.05 MHz.","108.8 MHz.","122.8 MHz."],
   a:2, ex:"The airport data block lists 122.8 MHz as the CTAF/UNICOM frequency. 122.05 MHz is the Flight Service frequency and 135.075 MHz is the AWOS frequency."},
  {s:"C", q:"(Refer to Figure 22, area 2 and Figure 31.) At Coeur D'Alene, which frequency should be used as a Common Traffic Advisory Frequency (CTAF) to monitor airport traffic?",
   c:["122.05 MHz.","122.8 MHz.","135.075 MHz."],
   a:1, ex:"At non-towered airports, the CTAF frequency is used to self-announce position or intentions. The A/FD lists the CTAF/UNICOM frequency as 122.8 MHz."},
  {s:"C", q:"(Refer to Figure 22, area 2 and Figure 31.) What is the correct UNICOM frequency to be used at Coeur D'Alene to request fuel?",
   c:["108.8 MHz.","122.8 MHz.","135.075 MHz."],
   a:1, ex:"Use the UNICOM/CTAF frequency of 122.8 MHz to request fuel, transportation, or other airport information."},
  {s:"C", q:"(Refer to Figure 59, area 1 and Figure 63.) What is the correct frequency to be used to contact Toledo Approach if approaching the Toledo Express Class C airspace from the east?",
   c:["123.975 MHz.","126.1 MHz.","134.35 MHz."],
   a:1, ex:"A box east of the Class C airspace says to contact Toledo Approach within 20 NM on 126.1 MHz (radials 360°–179°, the east side). 134.35 MHz is the west side, and 123.975 MHz is not associated with a specific direction."},
  {s:"C", q:"(Refer to Figure 25, area 3.) If Dallas Executive Tower is not in operation, which frequency should be used as a Common Traffic Advisory Frequency (CTAF) to monitor airport traffic?",
   c:["122.95 MHz.","126.35 MHz.","127.25 MHz."],
   a:2, ex:"The star next to \"CT 127.25\" indicates the tower operates part-time. The circled \"C\" indicates that 127.25 MHz is the CTAF frequency when the tower is not operating."},
  {s:"C", q:"(Refer to Figure 26, area 4.) The CTAF/UNICOM frequency at Jamestown Airport is",
   c:["118.425 MHz.","122.2 MHz.","123.0 MHz."],
   a:2, ex:"The CTAF symbol, the circled C, is next to the frequency 123.0 MHz. 118.425 MHz is for ASOS weather broadcasts and 122.2 MHz is for Flight Service."},
  {s:"C", q:"(Refer to Figure 26, area 5.) What is the CTAF/UNICOM frequency at Barnes County Airport?",
   c:["118.725 MHz.","122.8 MHz.","1402 kHz."],
   a:1, ex:"The CTAF symbol, the circled C, is next to the frequency 122.8 MHz. 118.725 MHz is for ASOS weather broadcasts and 1402 is the field elevation."},
  {s:"C", q:"(Refer to Figure 26, area 3.) When flying over Arrowwood National Wildlife Refuge, a pilot should fly no lower than",
   c:["2,000 feet AGL.","2,500 feet AGL.","3,000 feet AGL."],
   a:0, ex:"You are requested to maintain a minimum altitude of 2,000 feet above National Wildlife Refuges."},
  {s:"C", q:"Pilots flying over a national wildlife refuge are requested to fly no lower than",
   c:["1,000 feet AGL.","2,000 feet AGL.","3,000 feet AGL."],
   a:1, ex:"You are requested to maintain a minimum altitude of 2,000 feet above National Wildlife Refuges."},
  {s:"C", q:"(Refer to Figure 20, area 5.) The CAUTION box denotes what hazard to aircraft?",
   c:["Unmarked balloon on cable to 3,008 feet MSL.","Unmarked balloon on cable to 3,008 feet AGL.","Unmarked blimp hangers at 308 feet MSL."],

  {s:"D", q:"The basic VFR weather minimums for operating an aircraft within Class D airspace are",

  {s:"D", q:"When a control tower on an airport within Class D airspace ceases operation for the day, what happens to the airspace designation?",

let answered = 0, correct = 0;
const sectionCorrect = {A:0, B:0, C:0, D:0};
const sectionTotal   = {A:0, B:0, C:0, D:0};

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  document.getElementById('total-count').textContent = questions.length;

  const sections = {
    A: 'Section A – Safety of Flight',
    B: 'Section B – Airports',
    C: 'Section C – Aeronautical Charts',
    D: 'Section D – Airspace'
  };
  let currentSection = '';

  questions.forEach((q, idx) => {
    questions[idx]._answered = false;

    if (q.s !== currentSection) {
      currentSection = q.s;
      const count = questions.filter(x=>x.s===q.s).length;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML = sections[q.s] + `<span>${count} questions</span>`;
      container.appendChild(hdr);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-'+idx;

    const letters = ['A','B','C'];
    const choicesHtml = q.c.map((ch, ci) =>
      `<button class="choice-btn" onclick="answer(${idx},${ci})" id="btn-${idx}-${ci}">
         <span class="letter">${letters[ci]}.</span>${ch}
       </button>`
    ).join('');

    card.innerHTML = `
      <div class="q-number">Q${idx+1} &nbsp;·&nbsp; Section ${q.s}</div>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choicesHtml}</div>
      <div class="explanation" id="ex-${idx}"><strong>Explanation:</strong> ${q.ex}</div>`;
    container.appendChild(card);
  });

  // recompute section totals
  Object.keys(sectionTotal).forEach(k => sectionTotal[k] = questions.filter(x=>x.s===k).length);
}

function answer(qIdx, chosen) {
  const q = questions[qIdx];
  if (q._answered) return;
  q._answered = true;
  answered++;

  const letters = ['A','B','C'];
  const card = document.getElementById('q-'+qIdx);
  const ex   = document.getElementById('ex-'+qIdx);

  letters.forEach((_, ci) => {
    const btn = document.getElementById(`btn-${qIdx}-${ci}`);
    btn.disabled = true;
    if (ci === q.a) btn.classList.add('correct');
    else if (ci === chosen && chosen !== q.a) btn.classList.add('wrong');
  });

  ex.classList.add('visible');

  if (chosen === q.a) {
    correct++;
    sectionCorrect[q.s]++;
    card.classList.add('answered-correct');
  } else {
    card.classList.add('answered-wrong');
  }

  document.getElementById('answered-count').textContent = answered;
  document.getElementById('correct-count').textContent  = correct;
  const pct = Math.round(correct / answered * 100);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = (answered / questions.length * 100) + '%';

  if (answered === questions.length) showEnd();
}

function showEnd() {
  document.getElementById('end-screen').style.display = 'block';
  const pct = Math.round(correct / questions.length * 100);
  document.getElementById('final-score').textContent = pct + '%';
  document.getElementById('final-detail').textContent = `You answered ${correct} out of ${questions.length} questions correctly.`;
  const sNames = {
    A:'Section A – Safety of Flight',
    B:'Section B – Airports',
    C:'Section C – Aeronautical Charts',
    D:'Section D – Airspace'
  };
  document.getElementById('section-scores').innerHTML = Object.keys(sNames).map(s =>
    `<div class="section-score">${sNames[s]}: <strong>${sectionCorrect[s]}/${sectionTotal[s]}</strong> (${Math.round(sectionCorrect[s]/sectionTotal[s]*100)}%)</div>`
  ).join('');
  document.getElementById('end-screen').scrollIntoView({behavior:'smooth'});
}

function restartQuiz() {
  answered = 0; correct = 0;
  Object.keys(sectionCorrect).forEach(k => sectionCorrect[k] = 0);
  document.getElementById('answered-count').textContent = 0;
  document.getElementById('correct-count').textContent  = 0;
  document.getElementById('score-pct').textContent = '0%';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('end-screen').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildQuiz();
</script>
