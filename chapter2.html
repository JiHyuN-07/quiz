   q:"The presence of carburetor ice in an aircraft equipped with a fixed-pitch propeller can be verified by applying carburetor heat and noting",
   c:["an increase in RPM and then a gradual decrease in RPM.","a decrease in RPM and then a constant RPM indication.","a decrease in RPM and then a gradual increase in RPM."],
   a:2, ex:"When carburetor heat is first applied, the mixture is enriched, and RPM decreases. Then, as the ice melts, airflow into the carburetor increases, as does the engine RPM."},
  {s:"B",
   q:"With regard to carburetor ice, float-type carburetor systems in comparison to fuel injection systems are generally considered to be",
   c:["more susceptible to icing.","equally susceptible to icing.","less susceptible to icing."],
   a:0, ex:"Because the fuel is introduced directly into the hot cylinders instead of vaporizing in a cold venturi throat, fuel injection systems are not as susceptible to icing as float-type carburetors."},
  {s:"B",
   q:"One purpose of the dual-ignition system on an aircraft engine is to provide for",
   c:["improved engine performance.","uniform heat distribution.","balanced cylinder head pressure."],
   a:0, ex:"Dual-ignition systems fire two spark plugs on each cylinder. In addition to system redundancy, this improves combustion of the fuel/air mixture and results in slightly more power."},
  {s:"B",
   q:"What should be the first action after starting an aircraft engine?",
   c:["Adjust for proper RPM and check for desired indications on the engine gauges.","Place the magneto or ignition switch momentarily in the OFF position to check for proper grounding.","Test each brake and the parking brake."],
   a:0, ex:"Immediately after starting an engine, set the proper RPM and check engine gauges for proper indications. Turning the magnetos off could cause a backfire and testing the brakes occurs after the airplane starts moving."},
  {s:"B",
   q:"If the grade of fuel used in an aircraft engine is lower than specified for the engine, it will most likely cause",
   c:["detonation.","a mixture of fuel and air that is not uniform in all cylinders.","lower cylinder head temperatures."],
   a:0, ex:"The higher the grade of fuel, the more pressure it can withstand without detonating. Conversely, lower fuel grades are more prone to detonation with accompanying higher engine temperatures."},
  {s:"B",
   q:"Detonation occurs in a reciprocating aircraft engine when",
   c:["the spark plugs are fouled or shorted out or the wiring is defective.","hot spots in the combustion chamber ignite the fuel/air mixture in advance of normal ignition.","the unburned charge in the cylinders explodes instead of burning normally."],
   a:2, ex:"Detonation occurs when the fuel/air mixture suddenly explodes in the cylinders instead of burning smoothly. Detonation is caused by excessively lean mixtures, while hot spots in the cylinder cause preignition."},
  {s:"B",
   q:"If it becomes necessary to hand-prop an airplane engine, it is extremely important that a competent pilot",
   c:["call 'contact' before touching the propeller.","be at the controls in the cockpit.","be in the cockpit and call out all commands."],
   a:1, ex:"When hand-propping an airplane, a qualified pilot must be at the controls to prevent the airplane from moving and to set the engine controls properly. The person who is turning the propeller calls out the commands."},
  {s:"B",
   q:"Detonation may occur at high-power settings as",
   c:["the fuel mixture ignites instantaneously instead of burning progressively and evenly.","an excessively rich fuel mixture causes an explosive gain in power.","the fuel mixture is ignited too early by hot carbon deposits in the cylinder."],
   a:0, ex:"Detonation occurs when the fuel/air mixture suddenly explodes in the cylinders instead of burning smoothly."},
  {s:"B",
   q:"You suspect that your engine (with a fixed-pitch propeller) is detonating during climbout after takeoff. Your initial corrective action would be to",
   c:["lean the mixture.","lower the nose slightly to increase airspeed.","apply carburetor heat."],
   a:1, ex:"Detonation can occur when the engine overheats. During a climb, lowering the nose increases airspeed and reduces the rate of climb, increasing the cooling airflow around the engine."},
  {s:"B",
   q:"The uncontrolled firing of the fuel/air charge in advance of normal spark ignition is known as",
   c:["combustion.","preignition.","detonation."],
   a:1, ex:"Preignition occurs when the fuel/air mixture is ignited in advance of the normal timed ignition."},
  {s:"B",
   q:"Which would most likely cause the cylinder head temperature and engine oil temperature gauges to exceed their normal operating ranges?",
   c:["Using fuel that has a lower-than-specified fuel rating.","Using fuel that has a higher-than-specified fuel rating.","Operating with higher-than-normal oil pressure."],
   a:0, ex:"Lower grade fuels detonate under less pressure. Using fuel with a lower fuel rating than specified can cause detonation, which in turn leads to excessive engine temperatures."},
  {s:"B",
   q:"Which is true regarding starting a fuel-injected engine?",
   c:["Vapor lock typically occurs in cold weather conditions if the engine has not been started for a significant period of time.","Using the electric/auxiliary fuel pump to prime the engine can help purge vapors from the injection system.","A typical procedure for starting a flooded engine involves initially setting the throttle to idle and setting the mixture control to the idle-cutoff position."],
   a:1, ex:"Priming the engine provides a combustible mixture for starting and purges any vapors from the injection system. A fuel-injected engine can be difficult to restart a few minutes after shutdown due to vapor lock from residual heat."},
  {s:"B",
   q:"What type fuel can be substituted for an aircraft if the recommended octane is not available?",
   c:["The next higher octane aviation gas.","The next lower octane aviation gas.","Unleaded automotive gas of the same octane rating."],
   a:0, ex:"Typically, if you follow the manufacturer's recommendations, you may use the next higher grade of fuel. You may not use automotive gas unless the aircraft has a supplemental type certificate (STC) permitting its use."},
  {s:"B",
   q:"Filling the fuel tanks after the last flight of the day is considered a good operating procedure because this will",
   c:["force any existing water to the top of the tank away from the fuel lines to the engine.","prevent expansion of the fuel by eliminating airspace in the tanks.","prevent moisture condensation by eliminating airspace in the tanks."],
   a:2, ex:"As the airplane cools overnight, water condenses in the tanks from vapor in the air and enters the fuel. Filling the fuel tanks eliminates the airspace and prevents this condensation buildup."},
  {s:"B",
   q:"To properly purge water from the fuel system of an aircraft equipped with fuel tank sumps and a fuel strainer quick drain, it is necessary to drain fuel from the",
   c:["fuel strainer drain.","lowest point in the fuel system.","fuel strainer drain and the fuel tank sumps."],
   a:2, ex:"Fuel needs to be drained from both the fuel tank sumps and the fuel strainer drain. The fuel strainer drain might be the lowest point in the fuel system, but draining it without draining the fuel tank sumps is insufficient."},
  {s:"B",
   q:"An abnormally high engine oil temperature indication may be caused by",
   c:["the oil level being too low.","operating with a too high viscosity oil.","operating with an excessively rich mixture."],
   a:0, ex:"Engine oil lubricates moving parts, reduces friction, and carries heat from interior portions of the engine to the oil cooler. A low oil level is less effective at cooling the engine, indicated by high engine oil temperature."},
  {s:"B",
   q:"What action can you take to aid in cooling an engine that is overheating during a climb?",
   c:["Reduce rate of climb and increase airspeed.","Reduce climb speed and increase RPM.","Increase climb speed and increase RPM."],
   a:0, ex:"During a climb, lowering the nose increases airspeed. This action will reduce the rate of climb and increase the cooling airflow around the engine."},
  {s:"B",
   q:"Excessively high engine temperatures, either in the air or on the ground, will",
   c:["increase fuel consumption and may increase power due to the increased heat.","result in damage to heat-conducting hoses and warping of cylinder cooling fans.","cause loss of power, excessive oil consumption, and possible permanent internal engine damage."],
   a:2, ex:"High temperatures can cause detonation and a resulting loss of power, excessive oil consumption, and engine damage, including scoring of the cylinders and damage to piston, rings, and valves."},
  {s:"B",
   q:"For internal cooling, reciprocating aircraft engines are especially dependent on",
   c:["a properly functioning thermostat.","air flowing over the exhaust manifold.","the circulation of lubricating oil."],
   a:2, ex:"Engine oil lubricates moving parts, reduces friction, and carries heat from interior portions of the engine to the oil cooler."},
  {s:"B",
   q:"What is one procedure to aid in cooling an engine that is overheating?",
   c:["Enrichen the fuel mixture.","Increase the RPM.","Reduce the airspeed."],
   a:0, ex:"A richer fuel mixture burns at a lower temperature and reduces heat in the engine. Reducing airspeed reduces the airflow through the engine and worsens the problem."},
  {s:"B",
   q:"If you smell exhaust gases in flight, assume that",
   c:["Carbon monoxide is present — close the fresh air vents and turn the heater on so filtered air enters the cabin.","Carbon monoxide is present — turn off the heater, open the fresh air vents, and use supplemental oxygen, if it is available.","The cabin heat is working properly because heat is transferred to incoming air from the hot engine exhaust gases."],
   a:1, ex:"If the muffler is cracked, exhaust gases can enter the cabin. If you smell exhaust gases, you can assume that carbon monoxide is present. Turn off the heater, open the fresh air vents, and use supplemental oxygen, if it is available."},
  {s:"B",
   q:"How is engine operation controlled on an engine equipped with a constant-speed propeller?",
   c:["The throttle controls power output as registered on the manifold pressure gauge and the propeller control regulates engine RPM.","The throttle controls power output as registered on the manifold pressure gauge and the propeller control regulates a constant blade angle.","The throttle controls engine RPM as registered on the tachometer and the mixture control regulates the power output."],
   a:0, ex:"The throttle controls the power output of the engine, which is indicated on the manifold pressure gauge. The propeller control changes engine RPM by adjusting the pitch of the propeller."},
  {s:"B",
   q:"What is an advantage of a constant-speed propeller?",
   c:["Permits the pilot to select and maintain a desired cruising speed.","Permits the pilot to select the blade angle for the most efficient performance.","Provides a smoother operation with stable RPM and eliminates vibrations."],
   a:1, ex:"By setting propeller RPM, you indirectly set blade angle. Selecting the optimal blade angle enables a high percentage of engine power to be converted into thrust over a wide range of RPM and airspeed combinations."},
  {s:"B",
   q:"A precaution for the operation of an engine equipped with a constant-speed propeller is to",
   c:["avoid high RPM settings with high manifold pressure.","avoid high manifold pressure settings with low RPM.","always use a rich mixture with high RPM settings."],
   a:1, ex:"For a given RPM setting, there is a maximum allowable manifold pressure. Generally, you should avoid high manifold pressures with low RPM to prevent internal stress within the engine."},
  {s:"B",
   q:"Which preflight checks should you make on an airplane with full-authority digital engine control (FADEC)?",
   c:["Verify proper operation of both ECUs as well as their back-up power sources.","Ensure that engine RPM drops sufficiently when the propeller control is pulled back.","Ensure that the mixture control is adjusted for highest RPM with smooth engine operation."],
   a:0, ex:"Because the engine stops running if an ECU fails, redundant systems are required with back-up power. These systems should be checked for proper operation before flight."},
  {s:"B",
   q:"Which procedures are best practices that can aid in starting your airplane's engine in cold temperatures?",
   c:["Preheating; hand propping.","Priming; following vapor lock procedure.","Preheating; using external power."],
   a:2, ex:"In cold weather, the AFM/POH typically recommend using an external preheater and/or an external power source to start the engine. Hand-propping is dangerous and is generally discouraged."},
  {s:"B",
   q:"Which is an action to manage an alternator failure?",
   c:["Shed electrical load to preserve battery power for essential equipment.","Prepare to perform an emergency approach and landing.","Turn off the master switch to avoid a fire and prepare to land without radio communication, lights, or flaps."],
   a:0, ex:"Actions to manage an alternator failure include: shed electrical load to preserve battery power for essential equipment; notify ATC of the situation and use ATC services; be prepared to control the airplane and land without digital instruments, radio communication, lights, or flaps."},
  {s:"B",
   q:"Which situations would require an emergency descent?",
   c:["Loss of cabin pressurization; engine failure after takeoff; smoke on the flight deck.","Smoke on the flight deck; alternator failure; engine fire.","Loss of cabin pressurization; engine fire; smoke on the flight deck."],
   a:2, ex:"An emergency descent may be needed due to an uncontrollable engine or wing fire, smoke in the cockpit, a sudden loss of cabin pressurization, or any other situation that demands an immediate rapid descent."},
  {s:"B",
   q:"Steps for performing an emergency descent typically include to establish",
   c:["best glide speed.","a standard-rate turn.","a descending turn at 30° to 45°."],
   a:2, ex:"Steps to perform an emergency descent typically include: configure the airplane to descend; establish a descending turn at 30° to 45°; maintain the bank angle and maximum allowable airspeed (VNE, VA, VFE or VLE); return to straight-and-level flight; return to cruise flight or prepare for landing."},
  {s:"B",
   q:"Turning off the master switch is an appropriate immediate action to take when",
   c:["smoke or fire exists in the cabin.","the engine is running roughly.","you want to power only essential equipment after an alternator failure."],
   a:0, ex:"Managing smoke and fire in the cabin typically involves: turn off the master switch to remove the possible source of the fire; if flames exist, use the fire extinguisher; after extinguishing the fire, open the air vents to clear the cabin; land as soon as possible."},
  {s:"B",
   q:"Immediately grasping the control wheel and pulling the applicable circuit breakers as recommended by the AFM/POH is an action to manage",
   c:["runaway trim.","loss of elevator control due to linkage failure.","a flap malfunction."],
   a:0, ex:"If you experience a trim malfunction, immediately grasp the control wheel to control the airplane. If you cannot correct the problem and are experiencing runaway trim, pull the applicable circuit breakers as recommended by the AFM/POH and land as soon as practical."},
  {s:"B",
   q:"If the flaps do not extend as you prepare for landing",
   c:["the glide path is not as steep and floating during the flare is likely.","the landing distance will be decreased.","the glide path is steeper so be alert to errors in your judgment of height and distance."],
   a:0, ex:"Consider these factors for a no-flap approach and landing: the glide path is not as steep as with flaps extended, so the higher nose attitude on final can cause errors in judgment of height and distance; landing distance is substantially increased; floating during the flare is likely."},

  // ======= SECTION C – Flight Instruments =======
  {s:"C",
   q:"If an altimeter setting is not available before flight, to which altitude should you adjust the altimeter?",
   c:["The elevation of the nearest airport corrected to mean sea level.","The elevation of the departure area.","Pressure altitude corrected for nonstandard temperature."],
   a:1, ex:"If unable to obtain a local altimeter setting, you should set the altimeter to the departure field elevation as shown in flight information sources. Field elevation is already referenced to mean sea level (true altitude) and does not need to be corrected."},
  {s:"C",
   q:"Prior to takeoff, the altimeter should be set to",
   c:["the current local altimeter setting, if available, or the departure airport elevation.","the corrected density altitude of the departure airport.","the corrected pressure altitude for the departure airport."],
   a:0, ex:"If unable to obtain a local altimeter setting, you should set the altimeter to the departure field elevation as shown in flight information sources."},
  {s:"C",
   q:"If the pitot tube and outside static vents become clogged, which instruments would be affected?",
   c:["The altimeter, airspeed indicator, and turn-and-slip indicator.","The altimeter, airspeed indicator, and vertical speed indicator.","The altimeter, attitude indicator, and turn-and-slip indicator."],
   a:1, ex:"The altimeter, the airspeed indicator, and the vertical speed indicator all use static air and would therefore be affected. The turn-and-slip indicator and attitude indicator are gyroscopic instruments and are not affected."},
  {s:"C",
   q:"Which instrument becomes inoperative if the pitot tube becomes clogged?",
   c:["Altimeter.","Vertical speed.","Airspeed."],
   a:2, ex:"The airspeed indicator is the only pitot-static instrument that is connected to the pitot tube. It operates by sensing impact pressure (ram air) in the pitot tube and comparing it to static pressure."},
  {s:"C",
   q:"The pitot system provides impact pressure for which instrument?",
   c:["Altimeter.","Vertical-speed indicator.","Airspeed indicator."],
   a:2, ex:"The airspeed indicator is the only pitot-static instrument that is connected to the pitot tube. It operates by sensing impact pressure (ram air) in the pitot tube and comparing it to static pressure."},
  {s:"C",
   q:"Which instrument(s) become inoperative if the static vents become clogged?",
   c:["Airspeed only.","Altimeter only.","Airspeed, altimeter, and vertical speed."],
   a:2, ex:"The altimeter, the airspeed indicator, and the vertical speed indicator all use static air and would therefore be affected."},
  {s:"C",
   q:"Which V-speed represents maneuvering speed?",
   c:["VA.","VLO.","VNE."],
   a:0, ex:"VA is defined as the design maneuvering speed. VLO is maximum gear operating speed and VNE is never-exceed speed."},
  {s:"C",
   q:"Which V-speed represents maximum landing gear extended speed?",
   c:["VLE.","VLO.","VFE."],
   a:0, ex:"VLE is defined as maximum landing gear extended speed. VLO is maximum gear operating speed and VFE is maximum flap extended speed."},
  {s:"C",
   q:"VNO is defined as the",
   c:["normal operating range.","never-exceed speed.","maximum structural cruising speed."],
   a:2, ex:"VNO is defined as maximum structural cruising speed. It is at the upper end of the green arc—the normal operating range—on the airspeed indicator."},
  {s:"C",
   q:"Which V-speed represents maximum flap extended speed?",
   c:["VFE.","VLOF.","VFC."],
   a:0, ex:"VFE is defined as maximum flap extended speed."},
  {s:"C",
   q:"VS0 is defined as the",
   c:["stalling speed or minimum steady flight speed in the landing configuration.","stalling speed or minimum steady flight speed in a specified configuration.","stalling speed or minimum takeoff safety speed."],
   a:0, ex:"VS0 is stalling speed or minimum steady flight speed in a landing configuration. VS1 is the stalling speed in a specified configuration."},
  {s:"C",
   q:"(Refer to Figure 4.) What is the full flap operating range for the airplane?",
   c:["55 to 100 knots.","55 to 208 knots.","55 to 165 knots."],
   a:0, ex:"The white arc indicates the flap operating range. On this instrument, it is 55 to 100 knots."},
  {s:"C",
   q:"As altitude increases, the indicated airspeed at which a given airplane stalls in a particular configuration will",
   c:["decrease as the true airspeed decreases.","decrease as the true airspeed increases.","remain the same regardless of altitude."],
   a:2, ex:"Because airspeed indicators are calibrated to read true airspeed only under standard sea level conditions, the indicated airspeed does not reflect lower air density at higher altitudes. As a result, the indicated airspeed of a stall remains the same."},
  {s:"C",
   q:"What does the red line on an airspeed indicator represent?",
   c:["Maneuvering speed.","Turbulence or rough-air speed.","Never-exceed speed."],
   a:2, ex:"The red line on an airspeed indicator is the never-exceed speed (VNE)."},
  {s:"C",
   q:"(Refer to Figure 4.) Which marking identifies the never-exceed speed?",
   c:["Upper limit of the green arc.","Upper limit of the white arc.","The red radial line."],
   a:2, ex:"The red line is the never-exceed speed (VNE), the yellow arc is the caution range, the green arc is the normal operating range, and the white arc is the flap operating range."},
  {s:"C",
   q:"(Refer to Figure 4.) Which color identifies the power-off stalling speed in a specified configuration?",
   c:["Upper limit of the green arc.","Upper limit of the white arc.","Lower limit of the green arc."],
   a:2, ex:"The lower limit of the green arc represents the power-off stall speed in a specified configuration (VS1), which is usually flaps up and gear retracted."},
  {s:"C",
   q:"(Refer to Figure 4.) The maximum speed at which the airplane can be operated in smooth air is",
   c:["100 knots.","165 knots.","208 knots."],
   a:2, ex:"In smooth air, an airplane can be operated in the yellow arc up to the red line, in this case, 208 knots."},
  {s:"C",
   q:"(Refer to Figure 4.) What is the maximum flaps-extended speed?",
   c:["58 knots.","100 knots.","165 knots."],
   a:1, ex:"The maximum flaps-extended speed (VFE) is represented by the upper limit of the white arc, which in this case is 100 knots."},
  {s:"C",
   q:"(Refer to Figure 4.) What is the caution range of the airplane?",
   c:["0 to 55 knots.","100 to 165 knots.","165 to 208 knots."],
   a:2, ex:"The yellow arc indicates the caution range. On this instrument, it is 165 to 208 knots."},
  {s:"C",
   q:"What is an important airspeed limitation that is not color coded on airspeed indicators?",
   c:["Never-exceed speed.","Maneuvering speed.","Maximum structural cruising speed."],
   a:1, ex:"Maneuvering speed (VA) is not shown on the airspeed indicator as it varies with weight. You can find VA in the AFM/POH or on placards in the airplane."},
  {s:"C",
   q:"(Refer to Figure 4.) Which color identifies the normal flap operating range?",
   c:["The lower limit of the white arc to the upper limit of the green arc.","The green arc.","The white arc."],
   a:2, ex:"The white arc indicates the normal flap operating range."},
  {s:"C",
   q:"(Refer to Figure 4.) What is the maximum structural cruising speed?",
   c:["100 knots.","165 knots.","208 knots."],
   a:1, ex:"Maximum structural cruising speed (VNO) is indicated by the upper limit of the green arc, which in this case is 165 knots."},
  {s:"C",
   q:"(Refer to Figure 4.) Which color identifies the power-off stalling speed with wing flaps and landing gear in the landing configuration?",
   c:["Upper limit of the green arc.","Upper limit of the white arc.","Lower limit of the white arc."],
   a:2, ex:"Power-off stalling speed in the landing configuration (VS0) is represented by the lower limit of the white arc."},
  {s:"C",
   q:"(Refer to Figure 3.) Altimeter 1 indicates",
   c:["500 feet.","1,500 feet.","10,500 feet."],
   a:2, ex:"The small 10,000 ft pointer is just above the 1, indicating altitude above 10,000 feet. The wide 1,000 ft pointer is between 0 and 1 (less than 1,000 feet). The 100 ft pointer is on 5. Therefore, the reading is 10,500 feet."},
  {s:"C",
   q:"(Refer to Figure 3.) Altimeter 2 indicates",
   c:["1,500 feet.","4,500 feet.","14,500 feet."],
   a:2, ex:"The 10,000 ft pointer is above 1, the 1,000 ft pointer is above 4, and the 100 ft pointer is on 5. This indicates an altitude of 14,500 feet."},
  {s:"C",
   q:"(Refer to Figure 3.) Altimeter 3 indicates",
   c:["9,500 feet.","10,950 feet.","15,940 feet."],
   a:0, ex:"The 10,000 ft pointer is near 1, the 1,000 ft pointer is above 9, and the 100 ft pointer is on 5. This indicates the altitude is 9,500 feet."},
  {s:"C",
   q:"(Refer to Figure 3.) Which altimeter(s) indicate(s) more than 10,000 feet?",
   c:["1, 2, and 3.","1 and 2 only.","1 only."],
   a:1, ex:"Altimeter 1 reads 10,500 feet and Altimeter 2 reads 14,500 feet—both above 10,000 feet. Altimeter 3 reads 9,500 feet, which is below 10,000 feet."},
  {s:"C",
   q:"Altimeter setting is the value to which the barometric pressure scale of the altimeter is set so the altimeter indicates",
   c:["calibrated altitude at field elevation.","absolute altitude at field elevation.","true altitude at field elevation."],
   a:2, ex:"When the current altimeter setting is set on the ground, the altimeter reads true altitude of the field, which is the actual height above mean sea level."},
  {s:"C",
   q:"If the outside air temperature (OAT) at a given altitude is warmer than standard, the density altitude is",
   c:["equal to pressure altitude.","lower than pressure altitude.","higher than pressure altitude."],
   a:2, ex:"At standard temperature, density altitude is equal to pressure altitude. However, when the ambient air temperature is above standard, the air density is reduced, density altitude is higher than pressure altitude, and aircraft performance degrades."},
  {s:"C",
   q:"How do variations in temperature affect the altimeter?",
   c:["Pressure levels are raised on warm days and the indicated altitude is lower than true altitude.","Higher temperatures expand the pressure levels and the indicated altitude is higher than true altitude.","Lower temperatures lower the pressure levels and the indicated altitude is lower than true altitude."],
   a:0, ex:"Because atmospheric pressure levels are raised on warm days, the aircraft is at a higher altitude than indicated. In other words, the indicated altitude is lower than true altitude."},
  {s:"C",
   q:"What is true altitude?",
   c:["The vertical distance of the aircraft above sea level.","The vertical distance of the aircraft above the surface.","The height above the standard datum plane."],
   a:0, ex:"True altitude is the actual height (vertical distance) above mean sea level. The vertical distance above the surface is absolute altitude and the height above the standard datum plane is pressure altitude."},
  {s:"C",
   q:"What is absolute altitude?",
   c:["The altitude read directly from the altimeter.","The vertical distance of the aircraft above the surface.","The height above the standard datum plane."],
   a:1, ex:"Absolute altitude, often referred to as altitude above ground level (AGL), is the height (vertical distance) above the surface."},
  {s:"C",
   q:"What is density altitude?",
   c:["The height above the standard datum plane.","The pressure altitude corrected for nonstandard temperature.","The altitude read directly from the altimeter."],
   a:1, ex:"Density altitude is pressure altitude corrected for nonstandard temperature. Pressure altitude is the height above the standard datum plane, which is indicated when you set 29.92 on the scale in the altimeter setting window."},
  {s:"C",
   q:"What is pressure altitude?",
   c:["The indicated altitude corrected for position and installation error.","The altitude indicated when the barometric pressure scale is set to 29.92.","The indicated altitude corrected for nonstandard temperature and pressure."],
   a:1, ex:"Pressure altitude is the height above the standard datum plane, which is indicated when you set 29.92 on the scale in the altimeter setting window."},
  {s:"C",
   q:"Under what condition is pressure altitude and density altitude the same value?",
   c:["At sea level, when the temperature is 0°F.","When the altimeter has no installation error.","At standard temperature."],
   a:2, ex:"Because density altitude is pressure altitude corrected for nonstandard temperature, density altitude and pressure altitude are equal only at standard temperature."},
  {s:"C",
   q:"Which condition would cause the altimeter to indicate a lower altitude than true altitude?",
   c:["Air temperature lower than standard.","Atmospheric pressure lower than standard.","Air temperature warmer than standard."],
   a:2, ex:"When the air temperature is warmer than standard, indicated altitude is lower than actual (true) altitude."},
  {s:"C",
   q:"Under what condition will true altitude be lower than indicated altitude?",
   c:["In colder than standard air temperature.","In warmer than standard air temperature.","When density altitude is higher than indicated altitude."],
   a:0, ex:"When the air is colder than standard, the actual (true) altitude of an aircraft is lower than indicated."},
  {s:"C",
   q:"If a flight is made from an area of high pressure into an area of low pressure without the altimeter setting being adjusted, the altimeter will indicate",
   c:["lower than the actual altitude above sea level.","higher than the actual altitude above sea level.","the actual altitude above sea level."],
   a:1, ex:"The aircraft is at a lower true (actual) altitude above sea level than is indicated because the altimeter indicates higher than actual altitude. Remember, 'from high to low, look out below.'"},
  {s:"C",
   q:"If a flight is made from an area of low pressure into an area of high pressure without the altimeter setting being adjusted, the altimeter will indicate",
   c:["the actual altitude above sea level.","higher than the actual altitude above sea level.","lower than the actual altitude above sea level."],
   a:2, ex:"The aircraft is at a higher true (actual) altitude above sea level than is indicated because the altimeter indicates lower than the actual altitude."},
  {s:"C",
   q:"Under which condition will pressure altitude be equal to true altitude?",
   c:["When the atmospheric pressure is 29.92 inches Hg.","When standard atmospheric conditions exist.","When indicated altitude is equal to the pressure altitude."],
   a:1, ex:"Pressure altitude equals true altitude only when standard atmospheric conditions of pressure and temperature exist."},
  {s:"C",
   q:"Under what condition is indicated altitude the same as true altitude?",
   c:["If the altimeter has no mechanical error.","When at sea level under standard conditions.","When at 18,000 feet MSL with the altimeter set at 29.92."],
   a:1, ex:"If standard conditions (29.92 in Hg and 15°C) exist at sea level, indicated altitude is the same as true altitude, pressure altitude, and density altitude."},
  {s:"C",
   q:"What are the standard temperature and pressure values for sea level?",
   c:["15°C and 29.92 inches Hg.","59°C and 1013.2 millibars.","59°F and 29.92 millibars."],
   a:0, ex:"The standard atmosphere at sea level is a temperature of 15°C (59°F) and 29.92\" Hg (1013.2 millibars)."},
  {s:"C",
   q:"If it is necessary to set the altimeter from 29.15 to 29.85, what change occurs?",

let answered = 0, correct = 0;
const sectionCorrect = {A:0, B:0, C:0};
const sectionTotal   = {A:0, B:0, C:0};

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  document.getElementById('total-count').textContent = questions.length;

  const sections = {A: 'Section A – Airplanes', B: 'Section B – Powerplant and Related Systems', C: 'Section C – Flight Instruments'};
  let currentSection = '';

  questions.forEach((q, idx) => {
    questions[idx]._answered = false;
    sectionTotal[q.s]++;

    if (q.s !== currentSection) {
      currentSection = q.s;
      const count = questions.filter(x=>x.s===q.s).length;
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.innerHTML = sections[q.s] + `<span>${count} questions</span>`;
      container.appendChild(hdr);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-'+idx;

    const letters = ['A','B','C'];
    const choicesHtml = q.c.map((ch, ci) =>
      `<button class="choice-btn" onclick="answer(${idx},${ci})" id="btn-${idx}-${ci}">
         <span class="letter">${letters[ci]}.</span>${ch}
       </button>`
    ).join('');

    card.innerHTML = `
      <div class="q-number">Q${idx+1} &nbsp;·&nbsp; Section ${q.s}</div>
      <div class="q-text">${q.q}</div>
      <div class="choices">${choicesHtml}</div>
      <div class="explanation" id="ex-${idx}"><strong>Explanation:</strong> ${q.ex}</div>`;
    container.appendChild(card);
  });
}

function answer(qIdx, chosen) {
  const q = questions[qIdx];
  if (q._answered) return;
  q._answered = true;
  answered++;

  const letters = ['A','B','C'];
  const card = document.getElementById('q-'+qIdx);
  const ex   = document.getElementById('ex-'+qIdx);

  letters.forEach((_, ci) => {
    const btn = document.getElementById(`btn-${qIdx}-${ci}`);
    btn.disabled = true;
    if (ci === q.a) btn.classList.add('correct');
    else if (ci === chosen && chosen !== q.a) btn.classList.add('wrong');
  });

  ex.classList.add('visible');

  if (chosen === q.a) {
    correct++;
    sectionCorrect[q.s]++;
    card.classList.add('answered-correct');
  } else {
    card.classList.add('answered-wrong');
  }

  // Update score bar
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('correct-count').textContent  = correct;
  const pct = Math.round(correct / answered * 100);
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = (answered / questions.length * 100) + '%';

  if (answered === questions.length) showEnd();
}

function showEnd() {
  document.getElementById('end-screen').style.display = 'block';
  const pct = Math.round(correct / questions.length * 100);
  document.getElementById('final-score').textContent = pct + '%';
  document.getElementById('final-detail').textContent = `You answered ${correct} out of ${questions.length} questions correctly.`;
  const sNames = {A:'Section A – Airplanes', B:'Section B – Powerplant', C:'Section C – Flight Instruments'};
  document.getElementById('section-scores').innerHTML = Object.keys(sNames).map(s =>
    `<div class="section-score">${sNames[s]}: <strong>${sectionCorrect[s]}/${sectionTotal[s]}</strong> (${Math.round(sectionCorrect[s]/sectionTotal[s]*100)}%)</div>`
  ).join('');
  document.getElementById('end-screen').scrollIntoView({behavior:'smooth'});
}

function restartQuiz() {
  answered = 0; correct = 0;
  Object.keys(sectionCorrect).forEach(k => sectionCorrect[k] = 0);
  Object.keys(sectionTotal).forEach(k => sectionTotal[k] = 0);
  document.getElementById('answered-count').textContent = 0;
  document.getElementById('correct-count').textContent  = 0;
  document.getElementById('score-pct').textContent = '0%';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('end-screen').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0, behavior:'smooth'});
}

buildQuiz();
</script>
