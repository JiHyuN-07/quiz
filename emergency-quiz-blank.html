  <button id="btnCheck2" onclick="checkAll()">✓ ตรวจคำตอบ</button>
  <button id="btnShow2"  onclick="showAll()">👁 ดูเฉลย</button>
  <button id="btnReset2" onclick="resetAll()">↺ เริ่มใหม่</button>
</div>

<script>
function normalize(s) {
  return s.trim()
          .replace(/[‘’]/g, "'")   // อัญประกาศโค้ง -> ตรง
          .replace(/[–—]/g, '-')   // en/em dash -> ยัติภังค์
          .replace(/[º°]/g, '')    // ตัดสัญลักษณ์องศา (ºC พิมพ์แค่ C ก็ได้)
          .replace(/\s+/g, ' ');
}

function checkAll() {
  const inputs = document.querySelectorAll('input[data-answer]');
  let correct = 0, total = inputs.length;
  inputs.forEach(inp => {
    const ans = normalize(inp.dataset.answer);
    const val = normalize(inp.value);
    inp.classList.remove('correct','incorrect','show-answer');
    if (val === '') return;
    if (val === ans) {
      inp.classList.add('correct');
      correct++;
    } else {
      inp.classList.add('incorrect');
    }
  });
  const filled = Array.from(inputs).filter(i => i.value.trim() !== '').length;
  const scoreBar = document.getElementById('scoreBar');
  if (filled === 0) {
    scoreBar.textContent = 'กรุณากรอกคำตอบก่อน';
    scoreBar.className = 'score-bar';
    return;
  }
  const pct = Math.round(correct / total * 100);
  scoreBar.textContent = `คะแนน: ${correct} / ${total} (${pct}%) ${pct >= 70 ? '✓ ผ่าน' : '✗ ยังไม่ผ่าน'}`;
  scoreBar.className = 'score-bar ' + (pct >= 70 ? 'score-pass' : 'score-fail');
}

function showAll() {
  const inputs = document.querySelectorAll('input[data-answer]');
  inputs.forEach(inp => {
    inp.classList.remove('correct','incorrect');
    if (normalize(inp.value) === normalize(inp.dataset.answer)) {
      inp.classList.add('correct');
    } else {
      inp.value = inp.dataset.answer;
      inp.classList.add('show-answer');
    }
  });
  document.getElementById('scoreBar').textContent = 'แสดงเฉลยทั้งหมดแล้ว (สีเหลือง = เพิ่งเฉลย, สีเขียว = ตอบถูกเอง)';
  document.getElementById('scoreBar').className = 'score-bar';
}

function resetAll() {
  const inputs = document.querySelectorAll('input[data-answer]');
  inputs.forEach(inp => {
    inp.value = '';
    inp.classList.remove('correct','incorrect','show-answer');
  });
  document.getElementById('scoreBar').textContent = '';
  document.getElementById('scoreBar').className = 'score-bar';
}

// กด Enter ในช่องคำตอบใดก็ได้ = ตรวจคำตอบทันที
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.target.matches && e.target.matches('input[data-answer]')) {
    e.preventDefault();
    checkAll();
  }
});
</script>
