<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ควิซเวชศาสตร์การบิน — โผข้อสอบ (57 ข้อ)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun','Leelawadee UI','Segoe UI',Arial,sans-serif; background: #eef2f7; color: #1f2733; line-height:1.6; }

  header {
    background: linear-gradient(135deg, #16345f, #2d6abf);
    color: #fff; padding: 22px 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap:wrap; gap:8px;
  }
  header h1 { font-size: 1.35rem; }
  header p { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
  header .badge-key{ background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); padding:8px 12px; border-radius:10px; font-size:.78rem; line-height:1.5 }

  #score-bar {
    background: #fff; border-bottom: 2px solid #dde3ec;
    padding: 11px 28px; display: flex; gap: 26px; align-items: center;
    font-size: 0.88rem; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); flex-wrap: wrap;
  }
  #score-bar b { color: #16345f; }
  #progress-bar { flex: 1; min-width: 120px; height: 9px; background: #dde3ec; border-radius: 5px; overflow: hidden; }
  #progress-fill { height: 100%; width:0%; background: linear-gradient(90deg,#2d6abf,#27ae60); border-radius: 5px; transition: width .4s; }
  #score-bar .pill{ background:#f0f4fa; border:1px solid #dde3ec; padding:4px 10px; border-radius:20px; }

  .section-header {
    background: #16345f; color: #fff;
    padding: 13px 28px; font-size: 1.05rem; font-weight: 700;
    margin-top: 30px; letter-spacing: .3px;
  }
  .section-header .en { opacity: 0.75; font-size: 0.8rem; font-weight: 400; margin-left: 6px; display:block;}

  .question-card {
    background: #fff; margin: 14px 28px;
    border-radius: 10px; padding: 20px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    border-left: 4px solid #dde3ec; transition: border-color .2s;
  }
  .question-card.answered-correct { border-left-color: #27ae60; }
  .question-card.answered-wrong   { border-left-color: #e74c3c; }

  .q-top{ display:flex; align-items:center; gap:8px; margin-bottom:7px; flex-wrap:wrap;}
  .q-number { font-size: 0.72rem; color: #8a93a3; font-weight: 700; text-transform: uppercase; letter-spacing:.04em;}
  .tag{ font-size:.68rem; padding:2px 8px; border-radius:20px; font-weight:700; }
  .tag.key{ background:#fef3cd; color:#946200; border:1px solid #f3d98a;}
  .tag.ana{ background:#e7f0ff; color:#1f5cb8; border:1px solid #c3d8f7;}
  .tag.warn{ background:#fde8e8; color:#b0322a; border:1px solid #f5c2bd;}
  .q-text { font-size: 1.02rem; font-weight: 600; line-height: 1.55; margin-bottom: 15px; }

  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice-btn {
    display: flex; align-items: flex-start; gap: 12px;
    background: #f7f9fc; border: 2px solid #dde3ec;
    border-radius: 8px; padding: 11px 15px;
    cursor: pointer; font-size: 0.95rem; text-align: left; width:100%;
    transition: background .15s, border-color .15s; line-height: 1.5;
    font-family:inherit; color:inherit;
  }
  .choice-btn:hover:not(:disabled) { background: #e8eef8; border-color: #2d6abf; }
  .choice-btn .letter { font-weight: 800; color: #2d6abf; min-width: 24px; flex-shrink: 0; }
  .choice-btn.correct  { background: #eafaf1; border-color: #27ae60; }
  .choice-btn.wrong    { background: #fdf0ef; border-color: #e74c3c; }
  .choice-btn.correct .letter { color: #1e8e4e; }
  .choice-btn.wrong   .letter { color: #e74c3c; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .mk{ margin-left:auto; font-weight:800; }
  .choice-btn.correct .mk::after{ content:"✓"; color:#1e8e4e;}
  .choice-btn.wrong .mk::after{ content:"✗"; color:#e74c3c;}

  .explanation {
    display: none; margin-top: 13px;
    background: #f0f6ff; border-left: 3px solid #2d6abf;
    border-radius: 6px; padding: 11px 15px;
    font-size: 0.9rem; line-height: 1.65; color: #2a3340;
  }
  .explanation.visible { display: block; }
  .explanation b { color: #16345f; }
  .explanation .note{ display:block; margin-top:6px; color:#b0322a; font-size:.85rem;}

  #controls{ text-align:center; margin:26px; }
  .btn{ background:#2d6abf; color:#fff; border:none; padding:11px 26px; border-radius:8px; font-size:.95rem; cursor:pointer; font-weight:600; font-family:inherit; margin:4px;}
  .btn:hover{ background:#16345f; }
  .btn.ghost{ background:#fff; color:#2d6abf; border:2px solid #2d6abf;}

  #end-screen {
    display: none; text-align: center;
    background: #fff; margin: 26px; border-radius: 12px;
    padding: 42px 28px; box-shadow: 0 4px 20px rgba(0,0,0,.1);
  }
  #end-screen h2 { font-size: 1.7rem; color: #16345f; margin-bottom: 6px; }
  #end-screen .big-score { font-size: 3.6rem; font-weight: 800; color: #2d6abf; }
  #end-screen p { color: #555; margin: 6px 0; }
  .section-score { display: inline-block; margin: 5px 10px; font-size: 0.92rem; color: #444; background:#f4f7fb; padding:6px 12px; border-radius:8px;}
  footer{ text-align:center; color:#8a93a3; font-size:.82rem; padding:24px; }
  #quiz-tabs{ display:flex; background:#16345f; box-shadow:0 2px 6px rgba(0,0,0,.12); }
  .qtab{ flex:1; padding:14px 10px; border:none; background:transparent; color:#aebfd6; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; border-bottom:3px solid transparent; transition:background .15s,color .15s; }
  .qtab:hover{ color:#fff; background:rgba(255,255,255,.07); }
  .qtab.active{ color:#fff; background:#2d6abf; border-bottom-color:#27ae60; }
  .qtab span{ font-size:.78rem; font-weight:400; opacity:.85; }
  @media(max-width:640px){
    .question-card,.section-header,#score-bar,header{ margin-left:0; margin-right:0; padding-left:16px; padding-right:16px;}
    .question-card{ border-radius:0;}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🩺✈️ ควิซเวชศาสตร์การบิน — โผข้อสอบ</h1>
    <p>Aviation Physiology · Ground School 101 &nbsp;|&nbsp; 57 ข้อ</p>
  </div>
</header>

<div id="score-bar">
  <div class="pill">ทำแล้ว: <b id="answered-count">0</b> / <b id="total-count">57</b></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div class="pill">ถูก: <b id="correct-count">0</b></div>
  <div class="pill">คะแนน: <b id="score-pct">0%</b></div>
</div>

<div id="quiz-container"></div>

<div id="controls">
  <button class="btn ghost" id="revealAll">เฉลยทั้งหมด</button>
  <button class="btn" id="finishBtn">ดูสรุปคะแนน</button>
</div>

<div id="end-screen">
  <h2>ทำควิซเสร็จแล้ว! 🎉</h2>
  <div class="big-score" id="final-score"></div>
  <p id="final-detail"></p>
  <div id="section-scores"></div>
  <div style="margin-top:22px"><button class="btn" onclick="restartQuiz()">เริ่มใหม่</button></div>
</div>

<footer>สร้างจากโผข้อสอบ (โผพี่ชาย 61) + เนื้อหา Ground School 101 • ใช้สำหรับทบทวนเตรียมสอบ</footer>

<script>
const SEC_RECALL = {
  A:["A. บรรยากาศ & กฎของแก๊ส","Atmosphere & Gas Laws"],
  B:["B. ระบบหายใจ–ไหลเวียนเลือด","Respiration & Circulation"],
  C:["C. Hypoxia & Hyperventilation","ภาวะพร่องออกซิเจน & หายใจเกิน"],
  D:["D. Cabin Pressurization & Rapid Decompression","การปรับ/ลดความกดดัน"],
  E:["E. การมองเห็น","Vision"],
  F:["F. เสียง & การสั่นสะเทือน","Noise & Vibration"],
  G:["G. แรงเร่ง (Acceleration)","Acceleration & G"],
  H:["H. การหลงสภาพการบิน & Motion Sickness","SD & Motion Sickness"],
  I:["I. ความล้า & ระเบียบ","Fatigue & Regulations"],
  J:["J. อุปกรณ์ออกซิเจน","Oxygen Equipment"]
};

// โผข้อสอบ (57 ข้อ) — คำถาม+ตัวเลือกเต็มจาก "โผพี่ชาย 61" (ข้อ 1–48) + ข้อท้ายจากโผเดิม/โผ ๑๕๒
const Q_RECALL = [
{s:"A",q:"อัตราส่วนของก๊าซ ไนโตรเจน:ออกซิเจน:คาร์บอนไดออกไซด์ ในบรรยากาศคือข้อใด",c:["78:21:0.03","60:32:7","82:17:0.03","ไม่มีสัดส่วนตายตัว เปลี่ยนแปลงตามระดับความสูง"],a:0,ex:"องค์ประกอบอากาศ N₂ 78% : O₂ 21% : CO₂ ~0.03%"},
{s:"A",q:"ICAO International standard atmosphere กำหนดอุณหภูมิและความดันที่ระดับน้ำทะเลเท่ากับข้อใด",c:["0 องศาเซลเซียส, 760 mmHg","15 องศาเซลเซียส, 760 mmHg","15 องศาเซลเซียส, 670 mmHg","0 องศาเซลเซียส, 670 mmHg"],a:1,ex:"ICAO ISA: 15 °C และ 760 mmHg ที่ระดับน้ำทะเล"},
{s:"A",q:"ชั้นบรรยากาศที่มนุษย์อาศัย",c:["Mesosphere","Ionosphere","Stratosphere","Troposphere"],a:3,ex:"มนุษย์อาศัยในชั้น Troposphere"},
{s:"A",q:"ชั้นบรรยากาศที่มี ozone เป็นส่วนประกอบ",c:["Mesosphere","Ionosphere","Stratosphere","Troposphere"],a:2,ex:"Ozone layer อยู่ในชั้น Stratosphere"},
{s:"A",q:"Physiological efficient zone คือระดับความสูงไม่เกินเท่าใด",c:["5,000 ft.","10,000 ft.","15,000 ft.","20,000 ft."],a:1,ex:"Physiologic zone = 0–10,000 ft"},
{s:"A",q:"เมื่อทำการบินขึ้นสู่ที่สูง ทำให้ปริมาตรของก๊าซในอวัยวะบางอย่างในร่างกายเปลี่ยนแปลงไปด้วย เป็นไปตามกฎของก๊าซข้อใด",c:["Boyle's Law","Henry's Law","Charles' Law","Dalton's Law"],a:0,ex:"แก๊สในโพรงร่างกายขยายตัวเมื่อความดันลด (Boyle)"},
{s:"A",q:"ถ้าท่านมีบอลลูนขนาด 1000 ml ที่ระดับน้ำทะเล เมื่อปล่อยขึ้นสู่ที่สูง 20,000 ฟุต จะมีปริมาตรเท่าใด (ที่ 20,000 ฟุต = 350 mmHg)",c:["920 ml.","1085 ml.","1942 ml.","2171 ml."],a:3,ex:"Boyle: V₂ = V₁ × P₁/P₂ = 1000 × 760/350 ≈ 2171 ml"},
{s:"A",q:"ก๊าซในข้อใดในร่างกายที่เป็นสาเหตุสำคัญต่อการเกิดภาวะ Decompression sickness (DCS)",c:["ออกซิเจน","ไนโตรเจน","คาร์บอนไดออกไซด์","คาร์บอนมอนอกไซด์"],a:1,ex:"DCS เกิดจาก Nitrogen แยกตัวเป็นฟอง"},
{s:"A",q:"Trapped gas expansion และ Decompression sickness อธิบายโดยกฎของก๊าซข้อใดตามลำดับ",c:["Dalton's law / Boyle's law","Henry's law / Dalton's law","Boyle's law / Henry's law","Boyle's law / Law of gas diffusion"],a:2,ex:"Trapped gas = Boyle • DCS = Henry"},
{s:"A",q:"วัตถุประสงค์ที่สำคัญในการทำ Valsalva คือข้อใด",c:["ลดความดันในหูชั้นใน","ป้องกันอาการเวียนศีรษะ","ป้องกันการเกิดอาการหลงสภาพการบิน","การถ่ายเทความกดดันอากาศในหูชั้นกลาง"],a:3,ex:"Valsalva ปรับ/ระบายความดันในหูชั้นกลางผ่าน Eustachian tube"},
{s:"A",q:"การดำน้ำแบบ Scuba diving ควรงดทำการบินนานเท่าใดหลังจากดำน้ำดังกล่าว",c:["12 ชั่วโมง","24 ชั่วโมง","36 ชั่วโมง","48 ชั่วโมง"],a:1,ex:"ห้ามบินภายใน 24 ชม. หลังดำน้ำ scuba"},
{s:"A",q:"ในผู้ทำการในอากาศ ภาวะ Decompression sickness (DCS) มีโอกาสเกิดขึ้นตั้งแต่ความสูงเท่าใด",c:["10,000 ฟุต","25,000 ฟุต","18,000 ฟุต","35,000 ฟุต"],a:2,ex:"DCS เริ่มเสี่ยงที่ระดับสูงกว่า 18,000 ft"},
{s:"A",q:"วิธีการข้อใดสามารถป้องกันการเกิด Decompression sickness ได้",c:["ใช้ออกซิเจน 100% ขณะบิน","Denitrogenization","ปรับความกดดันบรรยากาศภายในห้องนักบิน","ถูกทุกข้อ"],a:3,ex:"ป้องกัน DCS ได้หลายวิธีรวมกัน"},
{s:"B",q:"ในกระบวนการเผาผลาญอาหารสิ่งใดต่อไปนี้ไม่เกี่ยวข้อง",c:["ก๊าซออกซิเจน","ก๊าซคาร์บอนมอนอกไซด์","พลังงาน","น้ำ"],a:1,ex:"คาร์บอนมอนอกไซด์ (CO) ไม่เกี่ยวข้องกับกระบวนการเผาผลาญ"},
{s:"B",q:"สิ่งต่อไปนี้มีผลต่อการควบคุมการหายใจ",c:["สมองส่วนเมดูลา (Medulla)","กล้ามเนื้อและขายโครงสร้างบริเวณหน้าอก","ความเป็นกรดเป็นด่างในเลือด","ถูกทุกข้อ"],a:3,ex:"การควบคุมการหายใจเกี่ยวข้องหลายปัจจัยรวมกัน"},
{s:"B",q:"กระบวนการแลกเปลี่ยนก๊าซออกซิเจนและคาร์บอนไดออกไซด์เกิดขึ้นที่ใด",c:["หลอดลม","โพรงจมูก","ปอดและเยื่อหุ้มปอด","ถุงลมและเส้นเลือดฝอยบริเวณถุงลม"],a:3,ex:"แลกเปลี่ยนแก๊สที่ถุงลม (alveoli) กับหลอดเลือดฝอยปอด"},
{s:"C",q:"ภาวะ hypoxia มีอาการดังต่อไปนี้ ยกเว้น",c:["เจ็บปวดกล้ามเนื้อ","มีหายใจเร็วรู้สึกหายใจไม่อิ่ม","เวียนศีรษะ มึนงง","มีความสุข เคลิบเคลิ้ม"],a:0,ex:"Hypoxia มักไม่เจ็บปวด → 'เจ็บปวดกล้ามเนื้อ' เป็นข้อยกเว้น"},
{s:"C",q:"การบริจาคโลหิตมีผลให้เกิด Hypoxia ได้ จึงต้องงดทำการบินนานเท่าใดหลังบริจาคโลหิต",c:["24 ชั่วโมง","48 ชั่วโมง","72 ชั่วโมง","96 ชั่วโมง"],a:2,ex:"งดบิน 72 ชม. หลังบริจาคเลือด"},
{s:"C",q:"นักบินงอแงทานเหล้าจนเกิดภาวะมึนเมา หลังจากทานมาแล้ว 6 ชม. จะทำการบินจะเสี่ยงทำให้เกิดภาวะ hypoxia ชนิดใด",c:["Hypoxic Hypoxia","Hypaemic hypoxia","Stagnant hypoxia","Histotoxic hypoxia"],a:3,ex:"แอลกอฮอล์ → Histotoxic hypoxia"},
{s:"C",q:"ไก่เกิดเป็นโควิดลงปอด ทำให้เสี่ยงต่อการเกิดภาวะใด",c:["Hypoxic hypoxia","Hypaemic hypoxia","Stagnant hypoxia","Histotoxic hypoxia"],a:0,ex:"ปอดเสียหาย แลกเปลี่ยน O₂ ได้น้อย → Hypoxic hypoxia"},
{s:"C",q:"ใครต่อไปนี้เสี่ยงต่อการเกิด Hypaemic hypoxia",c:["นาย ก ดำน้ำลึกเพื่อดูปะการังแล้วมาทำการบินก่อน 6 ชม.","นาย ข เป็นโรคหัวใจ มีภาวะหัวใจบีบตัวอ่อนแรง","นาย ค มีภาวะถุงลมโป่งพองจากสูบบุหรี่มานาน","นาย ช เป็นโรคโลหิตจาง ซีดบ่อย"],a:3,ex:"โลหิตจาง (anemia) ลด Hb ที่ขนส่ง O₂ → Hypaemic"},
{s:"C",q:"ปัจจัยใดไม่มีผลทำให้เกิดภาวะ hypoxia ได้ง่ายเมื่อทำการบิน",c:["การเจ็บป่วยไม่สบายก่อนทำการบิน","การสูบบุหรี่ ทานเหล้า ก่อนทำการบิน","การบินในสภาพอากาศหนาวเย็นมาก และขาดเครื่องทำความอบอุ่นร่างกาย","การว่ายและดำน้ำสระว่ายน้ำ รร.การบินเป็นประจำ"],a:3,ex:"การว่าย/ดำน้ำในสระเป็นประจำไม่เพิ่มความเสี่ยง hypoxia"},
{s:"C",q:"เมื่อเกิดภาวะ hypoxia ควรแก้ปัญหาดังต่อไปนี้ ยกเว้นข้อใด",c:["ใช้ออกซิเจน 100%","บินลดมาต่ำกว่า 10000 ฟุตอย่างรวดเร็ว","หายใจให้เร็วขึ้นเพื่อรับออกซิเจนให้เพียงพอ","ตรวจสอบระบบออกซิเจน"],a:2,ex:"'หายใจเร็ว' ไม่ใช่วิธีแก้ hypoxia (เสี่ยง hyperventilation)"},

let questions = Q_RECALL;
let sectionNames = SEC_RECALL;

const TH = ['ก','ข','ค','ง'];
const container = document.getElementById('quiz-container');
let answered = 0, correct = 0;
const stats = {}; // section -> {total, correct}

function buildQuiz(){
  container.innerHTML='';
  answered=0; correct=0;
  for(const k in stats) delete stats[k];
  let curSec=null, gi=0;
  questions.forEach((item, idx)=>{
    if(item.s!==curSec){
      curSec=item.s;
      const sh=document.createElement('div');
      sh.className='section-header';
      sh.innerHTML = sectionNames[curSec][0] + '<span class="en">'+sectionNames[curSec][1]+'</span>';
      container.appendChild(sh);
    }
    if(!stats[item.s]) stats[item.s]={total:0,correct:0};
    stats[item.s].total++;
    gi++;
    const card=document.createElement('div');
    card.className='question-card';
    card.id='q'+idx;
    let flag = item.flag ? ' <span class="tag warn">⚠️ '+item.flag+'</span>' : '';
    let html = '<div class="q-top"><span class="q-number">ข้อ '+(idx+1)+'</span>'+flag+'</div>';
    html += '<div class="q-text">'+item.q+'</div><div class="choices">';
    item.c.forEach((c,i)=>{
      html += '<button class="choice-btn" data-q="'+idx+'" data-i="'+i+'"><span class="letter">'+TH[i]+'.</span><span>'+c+'</span><span class="mk"></span></button>';
    });
    html += '</div><div class="explanation"><b>เฉลย: '+TH[item.a]+'.</b> '+item.ex+'</div>';
    card.innerHTML=html;
    container.appendChild(card);
  });
  container.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.addEventListener('click', onAnswer);
  });
  updateBar();
  document.getElementById('end-screen').style.display='none';
}

function onAnswer(e){
  const btn=e.currentTarget;
  const qi=+btn.dataset.q, ci=+btn.dataset.i;
  const card=document.getElementById('q'+qi);
  if(card.classList.contains('done')) return;
  card.classList.add('done');
  const item=questions[qi];
  const btns=card.querySelectorAll('.choice-btn');
  btns.forEach(b=>{
    b.disabled=true;
    const i=+b.dataset.i;
    if(i===item.a) b.classList.add('correct');
    else if(i===ci) b.classList.add('wrong');
  });
  card.querySelector('.explanation').classList.add('visible');
  answered++;
  if(ci===item.a){ correct++; card.classList.add('answered-correct'); stats[item.s].correct++; }
  else card.classList.add('answered-wrong');
  updateBar();
}

function updateBar(){
  document.getElementById('answered-count').textContent=answered;
  document.getElementById('correct-count').textContent=correct;
  document.getElementById('score-pct').textContent=(answered? Math.round(correct/answered*100):0)+'%';
  document.getElementById('progress-fill').style.width=(answered/questions.length*100)+'%';
}

document.getElementById('revealAll').addEventListener('click', ()=>{
  questions.forEach((item,qi)=>{
    const card=document.getElementById('q'+qi);
    if(card.classList.contains('done')) return;
    card.classList.add('done');
    card.querySelectorAll('.choice-btn').forEach(b=>{
      b.disabled=true;
      if(+b.dataset.i===item.a) b.classList.add('correct');
    });
    card.querySelector('.explanation').classList.add('visible');
  });
});

document.getElementById('finishBtn').addEventListener('click', showEnd);
function showEnd(){
  const pct=Math.round(correct/questions.length*100);
  document.getElementById('final-score').textContent=correct+'/'+questions.length;
  document.getElementById('final-detail').textContent='ตอบแล้ว '+answered+' ข้อ • คิดเป็น '+pct+'% ของทั้งหมด';
  let sh='';
  for(const s in stats){
    sh+='<span class="section-score">'+s+': '+stats[s].correct+'/'+stats[s].total+'</span>';
  }
  document.getElementById('section-scores').innerHTML=sh;
  const es=document.getElementById('end-screen');
  es.style.display='block';
  es.scrollIntoView({behavior:'smooth'});
}
function restartQuiz(){ buildQuiz(); window.scrollTo({top:0,behavior:'smooth'}); }

document.getElementById('total-count').textContent = questions.length;

buildQuiz();
</script>
